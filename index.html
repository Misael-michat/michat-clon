<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiChat.cl</title>
    <link rel="stylesheet" href="estilo_nuevo.css">
</head>
<body>

    <div class="chat-window">
        <div class="top-toolbar">
            <button class="tool-btn">👥</button>
            <button class="tool-btn">📋</button>
            <input type="text" id="customNick" value="ADMIN_DUEÑO">
            <button id="botonBorrarAdmin">🗑️ BORRAR CHAT</button>
        </div>

        <div class="tabs">
            <div class="tab">Salas</div>
            <div class="tab active">Chile</div>
        </div>

        <div class="main-content">
            <div class="chat-area">
                <div class="message-history">
                    <div id="contenedorMensajesAdmin"></div>
                </div>
            </div>
            <div class="user-list-container">
                <div class="user-count">542 Usuarios</div>
            </div>
        </div>

        <div class="input-container-block">
            <input type="text" id="textoParaEnviar" placeholder="Escribe un mensaje...">
            <button id="botonEnviarClasico">ENVIAR</button>
        </div>
    </div>

    <script>
        // Tu script se mantiene igual, no necesita cambios
        const miCajaTexto = document.getElementById('textoParaEnviar');
        const miBoton = document.getElementById('botonEnviarClasico');
        const contenedorAdmin = document.getElementById('contenedorMensajesAdmin');
        
        function procesarMensaje() {
            const mensaje = miCajaTexto.value.trim();
            if (mensaje === "") return;
            const renglon = document.createElement('div');
            renglon.className = 'msg';
            renglon.innerText = "ADMIN: " + mensaje;
            contenedorAdmin.appendChild(renglon);
            miCajaTexto.value = "";
        }
        miBoton.onclick = procesarMensaje;
    </script>
</body>
</html>
